<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Brew & Co. - 커피 주문</title>
  <link href="/style.css" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">&#9749;</span>
        <span class="logo-text">Brew &amp; Co.</span>
      </div>
      <button class="cart-btn" id="cartBtn" aria-label="장바구니">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <!-- Hero Banner -->
  <section class="hero">
    <p class="hero-sub">오늘도 좋은 하루</p>
    <h2 class="hero-title">어떤 커피를<br>드릴까요?</h2>
  </section>

  <!-- Orderer Select -->
  <section class="orderer-section">
    <span class="orderer-label">주문자</span>
    <div class="orderer-select-wrap">
      <select id="ordererSelect" class="orderer-select">
        <option value="">이름을 선택하세요</option>
        <option>임정엽</option>
        <option>천희진</option>
        <option>장어진</option>
        <option>박민석</option>
        <option>양수연</option>
        <option>허민영</option>
      </select>
      <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </section>

  <!-- Category Tabs -->
  <nav class="category-nav" id="categoryNav">
    <button class="cat-btn active" data-category="coffee">커피</button>
    <button class="cat-btn" data-category="latte">라떼&amp;프라푸치노</button>
    <button class="cat-btn" data-category="yogurt">요거트&amp;스무디</button>
    <button class="cat-btn" data-category="ade">에이드&amp;아이스티</button>
    <button class="cat-btn" data-category="tea">차</button>
    <button class="cat-btn" data-category="juice">쥬스</button>
  </nav>

  <!-- Menu Grid -->
  <main class="menu-container">
    <div class="menu-grid" id="menuGrid"></div>
  </main>

  <!-- Floating Cart Button -->
  <button class="fab-cart" id="fabCart">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    <span id="fabText">장바구니</span>
    <span class="fab-total" id="fabTotal"></span>
  </button>

  <!-- Cart Sheet -->
  <div class="overlay" id="overlay"></div>
  <div class="cart-sheet" id="cartSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <h3>장바구니</h3>
        <span class="sheet-orderer" id="sheetOrderer"></span>
      </div>
      <button class="sheet-close" id="sheetClose">&#10005;</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="cart-empty">담은 메뉴가 없어요.</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="total-row">
        <span>합계</span>
        <span class="total-price" id="totalPrice">0원</span>
      </div>
      <button class="order-btn" id="orderBtn">주문하기</button>
    </div>
  </div>

  <!-- Order Confirm Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="orderModal">
      <div class="modal-icon">&#10003;</div>
      <h3>주문 완료!</h3>
      <p class="modal-msg" id="modalMsg"></p>
      <button class="modal-close-btn" id="modalCloseBtn">확인</button>
    </div>
  </div>

  <!-- Option Selection Modal -->
  <div class="modal-overlay" id="optionModalOverlay">
    <div class="modal option-modal" id="optionModal">
      <div class="option-modal-header">
        <div class="option-modal-emoji" id="optEmoji">☕</div>
        <div class="option-modal-info">
          <h3 id="optName">메뉴 이름</h3>
          <p id="optDesc">메뉴 설명</p>
        </div>
        <button class="sheet-close" id="optClose">&#10005;</button>
      </div>
      
      <div class="option-modal-body">
        <!-- Quantity -->
        <div class="opt-group">
          <span class="opt-label">수량</span>
          <div class="item-qty">
            <button class="qty-btn" id="optMinus">&#8722;</button>
            <span class="qty-num" id="optQty">1</span>
            <button class="qty-btn" id="optPlus">+</button>
          </div>
        </div>

        <!-- Temp -->
        <div class="opt-group">
          <span class="opt-label">온도</span>
          <div class="opt-row" id="optTempRow">
            <button class="opt-btn hot" data-val="HOT">HOT</button>
            <button class="opt-btn iced active" data-val="ICED">ICED</button>
          </div>
        </div>

        <!-- Options -->
        <div class="opt-group">
          <span class="opt-label">옵션</span>
          <div class="opt-row">
            <button class="opt-btn" id="optSizeUp">사이즈 업</button>
            <button class="opt-btn" id="optAddShot">샷 추가(+500원)</button>
            <button class="opt-btn" id="optSoyMilk">두유 변경(+500원)</button>
            <button class="opt-btn" id="optDecaf">디카페인(+500원)</button>
          </div>
        </div>

        <!-- Strength -->
        <div class="opt-group">
          <span class="opt-label">농도</span>
          <div class="opt-row" id="optStrengthRow">
            <button class="opt-btn" data-val="light">연하게</button>
            <button class="opt-btn active" data-val="normal">기본</button>
            <button class="opt-btn" data-val="strong">진하게</button>
          </div>
        </div>
      </div>

      <div class="option-modal-footer">
        <div class="opt-total">
          <span>합계</span>
          <span id="optTotalPrice">0원</span>
        </div>
        <button class="order-btn" id="optConfirmBtn">장바구니 담기</button>
      </div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script defer src="/main.js"></script>
</body>
</html>
